# X-Env-Layer-Desc: Raspberry Pi 2712 kernel
# X-Env-Layer-Version: 2.1.0
# X-Env-Layer-Requires: linux-base
# X-Env-Layer-RequiresProvider: hw:soc:bcm2712
#
